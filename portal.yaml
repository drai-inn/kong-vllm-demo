---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-portal-sa
  namespace: kai-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portal-manager-role
  namespace: kai-test
rules:
  # Permission to manage Secrets (for API keys)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "patch", "delete"]
  # Permission to manage KongConsumers
  - apiGroups: ["configuration.konghq.com"]
    resources: ["kongconsumers"]
    verbs: ["create", "get", "patch", "delete", list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portal-manager-binding
  namespace: kai-test
subjects:
  - kind: ServiceAccount
    name: api-portal-sa
    namespace: kai-test
roleRef:
    kind: Role
    name: portal-manager-role
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-portal
  namespace: kai-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-portal
  template:
    metadata:
      labels:
        app: api-portal
    spec:
      serviceAccountName: api-portal-sa
      containers:
      - name: api-portal
        image: cdjs/kong-portal:litellm
        imagePullPolicy: Always
        env:
        - name: KEYCLOAK_URL
          value: "https://keycloak.test.drai.auckland.ac.nz"
        - name: KEYCLOAK_REALM
          value: "drai"
        - name: KEYCLOAK_CLIENT_ID
          value: "portal-test"
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: portal-secrets
              key: keycloak-client-secret
        - name: APP_URL
          value: "https://portal.test.drai.auckland.ac.nz"
        - name: LITELLM_API_URL
          value: "http://litellm.litellm.svc.cluster.local:4000"
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: portal-secrets
              key: litellm-master-key
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-portal
  namespace: kai-test
spec:
  selector:
    app: api-portal
  ports:
  - port: 80
    targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-portal-ingress
  namespace: kai-test
  annotations:
    cert-manager.io/cluster-issuer: zerossl-kong-issuer
spec:
  ingressClassName: kong
  tls:
    - hosts:
        - portal.test.drai.auckland.ac.nz
      secretName: portal-test-tls
  rules:
    - host: portal.test.drai.auckland.ac.nz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-portal
                port:
                  number: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: ai-log-receiver
  namespace: kai-test
  labels:
    app: ai-log-receiver
spec:
  containers:
  - name: receiver
    image: mendhak/http-https-echo
    ports:
    - containerPort: 8080
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-log-receiver
  namespace: kai-test
spec:
  selector:
    app: ai-log-receiver
  ports:
  - port: 80
    targetPort: 8080

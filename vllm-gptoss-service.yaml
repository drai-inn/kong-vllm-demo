---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-gptoss-pvc
  namespace: kai-test
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-ssd
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gptoss
  namespace: kai-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-gptoss
  template:
    metadata:
      labels:
        app: vllm-gptoss
        kai.scheduler/queue: research
      annotations:
        gpu-fraction: "0.6"
    spec:
      runtimeClassName: nvidia
      schedulerName: kai-scheduler
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.17.0
          ports:
            - containerPort: 8000
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Cleaning conflicting CUDA compat libs..."
              rm -rf /usr/local/cuda/compat

              echo "Starting vLLM..."
              python3 -m vllm.entrypoints.openai.api_server \
                --host 0.0.0.0 \
                --port 8000 \
                --model cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit \
                --served-model-name Qwen3.5-35B-A3B \
                --chat-template /templates/chat-template.j2 \
                --kv-cache-dtype fp8 \
                --language-model-only \
                --reasoning_parser qwen3 \
                --enable-auto-tool-choice --tool-call-parser qwen3_coder \
                --gpu-memory-utilization 0.85
          env:
            - name: TZ
              value: Pacific/Auckland
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: NCCL_IB_DISABLE
              value: "1"
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
            - name: HF_HOME
              value: /models/hf
            - name: VLLM_CACHE_ROOT
              value: /models/vllm_cache_root
            - name: VLLM_CONFIG_ROOT
              value: /models/vllm_config_root
          resources:
            requests:
              cpu: "4"
              memory: "12Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
          volumeMounts:
            - name: mps
              mountPath: /mps/nvidia.com/gpu/pipe
            - name: dshm
              mountPath: /dev/shm
            - name: models
              mountPath: /models
            - name: chat-template
              mountPath: /templates/chat-template.j2
              subPath: chat-template.j2
      volumes:
        - name: mps
          hostPath:
            path: /mps/nvidia.com/gpu/pipe
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        - name: models
          persistentVolumeClaim:
            claimName: vllm-gptoss-pvc
        - name: chat-template
          configMap:
            name: vllm-chat-template
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-gptoss-service
  namespace: kai-test
spec:
  selector:
    app: vllm-gptoss
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
